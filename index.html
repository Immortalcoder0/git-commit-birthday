<html lang="en">

    <title>Scroll Animated Experience</title>

    <div id="app">
      <!-- The sticky container that holds the canvas -->
      <div class="canvas-container">
        <canvas id="hero-lightpass"></canvas>

          <h1>Welcome to the Experience</h1>
        </section>
        <section class="step step-2">
          <h2>High Performance</h2>
        </section>
        <section class="step step-3">
          <h2>Immersive Scroll</h2>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
